<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer - OBS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      min-width: 280px;
    }
    .label {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6);
    }
    .session-info {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      opacity: 0.75;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    .timer {
      font-size: 6rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.6);
    }
    .progress-wrapper {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.15);
      margin-top: 0.25rem;
    }
    .progress-bar {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-bar.study { background: #6BA3E8; }
    .progress-bar.break { background: #6BCB77; }
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.75rem;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      opacity: 0.85;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    .meta-row span { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <span class="label" id="label">STUDY TIME</span>
    <span class="session-info" id="sessionInfo">Session 1</span>
    <div class="timer" id="timer" role="timer" aria-live="polite">20:00</div>
    <div class="progress-wrapper">
      <div class="progress-bar study" id="progressBar"></div>
    </div>
    <div class="meta-row">
      <span id="localTime">--:--</span>
      <span id="weather">--°C · --</span>
    </div>
  </div>
  <script>
    (function () {
      var STUDY_DURATION_MS = 20 * 60 * 1000;   // 20 min (light)
      var SHORT_BREAK_MS = 5 * 60 * 1000;
      var LONG_BREAK_MS = 15 * 60 * 1000;

      var mode = 'study';
      var sessionCount = 0;
      var phaseStartTime = Date.now();
      var lastDisplayedSecond = -1;

      var labelEl = document.getElementById('label');
      var sessionInfoEl = document.getElementById('sessionInfo');
      var timerEl = document.getElementById('timer');
      var progressBarEl = document.getElementById('progressBar');
      var localTimeEl = document.getElementById('localTime');
      var weatherEl = document.getElementById('weather');

      var DEFAULT_LAT = -6.2088;
      var DEFAULT_LON = 106.8456;
      var weatherRefreshMs = 10 * 60 * 1000;
      var lastWeatherFetch = 0;

      function formatLocalTime() {
        var d = new Date();
        var mon = d.toLocaleDateString('en-US', { month: 'short' });
        var day = d.getDate();
        var h = d.getHours();
        var m = d.getMinutes();
        var mm = m < 10 ? '0' + m : m;
        return mon + ' ' + day + ', ' + h + ':' + mm;
      }

      function weatherCodeToLabel(code) {
        if (code === 0) return 'Clear';
        if (code >= 1 && code <= 3) return 'Partly cloudy';
        if (code >= 45 && code <= 48) return 'Fog';
        if (code >= 51 && code <= 57) return 'Drizzle';
        if (code >= 61 && code <= 67) return 'Rain';
        if (code >= 71 && code <= 77) return 'Snow';
        if (code >= 80 && code <= 82) return 'Showers';
        if (code >= 85 && code <= 86) return 'Snow showers';
        if (code >= 95 && code <= 99) return 'Thunderstorm';
        return 'Cloudy';
      }

      function fetchWeather(lat, lon) {
        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,weather_code';
        fetch(url)
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data && data.current) {
              var temp = Math.round(data.current.temperature_2m);
              var label = weatherCodeToLabel(data.current.weather_code || 0);
              weatherEl.textContent = temp + '°C · ' + label;
            }
          })
          .catch(function () { weatherEl.textContent = '--°C · --'; });
      }

      function tryLoadWeather() {
        var now = Date.now();
        if (now - lastWeatherFetch < weatherRefreshMs && weatherEl.textContent.indexOf('°C') !== -1 && weatherEl.textContent.indexOf('--') === -1) return;
        lastWeatherFetch = now;
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            function (pos) {
              fetchWeather(pos.coords.latitude, pos.coords.longitude);
            },
            function () { fetchWeather(DEFAULT_LAT, DEFAULT_LON); },
            { timeout: 3000 }
          );
        } else {
          fetchWeather(DEFAULT_LAT, DEFAULT_LON);
        }
      }

      tryLoadWeather();
      setInterval(tryLoadWeather, weatherRefreshMs);

      function getDuration() {
        if (mode === 'study') return STUDY_DURATION_MS;
        return sessionCount % 4 === 0 ? LONG_BREAK_MS : SHORT_BREAK_MS;
      }

      function formatMMSS(ms) {
        var totalSeconds = Math.max(0, Math.floor(ms / 1000));
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
      }

      function update() {
        var now = Date.now();
        var duration = getDuration();
        var elapsed = now - phaseStartTime;

        if (elapsed >= duration) {
          if (mode === 'study') {
            sessionCount++;
            mode = 'break';
          } else {
            mode = 'study';
          }
          phaseStartTime = Date.now();
          elapsed = 0;
          duration = getDuration();
          lastDisplayedSecond = -1;
          labelEl.textContent = mode === 'study' ? 'STUDY TIME' : 'BREAK TIME';
          sessionInfoEl.textContent = mode === 'study' ? 'Session ' + (sessionCount + 1) : 'Break · session ' + sessionCount + ' completed';
          progressBarEl.className = 'progress-bar ' + mode;
        }

        var remaining = Math.max(0, duration - elapsed);
        var currentSecond = Math.floor(remaining / 1000);
        if (currentSecond !== lastDisplayedSecond) {
          lastDisplayedSecond = currentSecond;
          timerEl.textContent = formatMMSS(remaining);
        }
        var progress = duration > 0 ? (elapsed / duration) * 100 : 0;
        progressBarEl.style.width = progress + '%';

        localTimeEl.textContent = formatLocalTime();

        requestAnimationFrame(update);
      }

      phaseStartTime = Date.now();
      labelEl.textContent = 'STUDY TIME';
      sessionInfoEl.textContent = 'Session 1';
      progressBarEl.className = 'progress-bar study';
      requestAnimationFrame(update);
    })();
  </script>
</body>
</html>
